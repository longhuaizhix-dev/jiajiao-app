        // 渲染订单卡片的函数
        function renderOrders(data) {
            const list = document.getElementById('orderList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';
            
            if(data.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            data.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header">
                        <span class="order-id">编号：${order.id}</span>
                        <span class="order-price">${order.price}</span>
                    </div>
                    <div>
                        <span class="order-tag">${order.gradeDetail}</span>
                        <span class="order-tag">${order.subject}</span>
                        <span class="order-tag">${order.area}</span>
                    </div>
                    <div class="order-desc">
                        📍 <strong>位置：</strong>${order.address}<br>
                        ⏰ <strong>时间：</strong>${order.time}<br>
                        📝 <strong>要求：</strong>${order.desc}
                    </div>
                    <button class="btn-copy" onclick="alert('请在微信中复制编号：${order.id} 发送给我接单！')">点击抢单</button>
                `;
                list.appendChild(card);
            });
        }

        // 筛选逻辑，完美支持“模糊包含”
        function filterOrders() {
            const gFilter = document.getElementById('gradeFilter').value;
            const sFilter = document.getElementById('subjectFilter').value;
            const aFilter = document.getElementById('areaFilter').value;

            const filtered = orders.filter(order => {
                const matchGrade = (gFilter === '全部') || order.grade.includes(gFilter);
                // 只要订单的科目里包含筛选的字眼就算匹配
                const matchSubject = (sFilter === '全部') || order.subject.includes(sFilter);
                const matchArea = (aFilter === '全部') || order.area.includes(aFilter);
                return matchGrade && matchSubject && matchArea;
            });

            renderOrders(filtered);
        }

        // 页面加载时默认渲染所有订单
        window.onload = () => filterOrders();
