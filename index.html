        // 核心：年级数字与文字转换逻辑
        const gradeMap = {
            "一年级": ["一", "1"], "二年级": ["二", "2"], "三年级": ["三", "3"],
            "四年级": ["四", "4"], "五年级": ["五", "5"], "六年级": ["六", "6"]
        };

        function renderOrders(data) {
            const list = document.getElementById('orderList');
            const tips = document.getElementById('emptyTips');
            list.innerHTML = '';
            
            if (data.length === 0) { tips.style.display = 'block'; return; }
            tips.style.display = 'none';

            data.forEach(item => {
                const orderId = item["编号"] || item["订单编号"] || item["ID"] || Object.values(item)[0];
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header">
                        <span class="order-id">编号：${orderId}</span>
                        <span class="order-price">${item["报价"] || '面议'}</span>
                    </div>
                    <div class="tags">
                        <span class="order-tag">${item["学生年级"]}</span>
                        <span class="order-tag">${item["学生性别"]}</span>
                        <span class="order-tag">${item["补习科目"]}</span>
                    </div>
                    <div class="info-row"><span class="info-label">📍 地点：</span><span class="info-content">${item["地址"]}</span></div>
                    <div class="info-row"><span class="info-label">⏰ 时间：</span><span class="info-content">${item["补习时间"]}</span></div>
                    <div class="info-row"><span class="info-label">📝 要求：</span><span class="info-content">${item["对老师要求"]}</span></div>
                    <button class="btn-grab" onclick="copyAndAlert('${orderId}')">点击抢单</button>
                `;
                list.appendChild(card);
            });
        }

        function filterOrders() {
            const g = document.getElementById('gradeFilter').value;
            const s = document.getElementById('subjectFilter').value;
            const a = document.getElementById('areaFilter').value;

            const filtered = orders.filter(item => {
                // 年级模糊匹配（兼容 1 和 一）
                let mg = (g === '全部');
                if (!mg) {
                    const keywords = gradeMap[g] || [g];
                    mg = keywords.some(k => item["学生年级"] && item["学生年级"].toString().includes(k));
                }
                const ms = (s === '全部') || (item["补习科目"] && item["补习科目"].includes(s));
                const ma = (a === '全部') || (item["地址"] && item["地址"].includes(a));
                return mg && ms && ma;
            });
            renderOrders(filtered);
        }

        async function copyAndAlert(id) {
            const item = orders.find(o => (o["编号"]||o["订单编号"]||o["ID"]||Object.values(o)[0]) == id);
            const text = `\n编号：${id}\n学生性别：${item["学生性别"]}\n年级：${item["学生年级"]}\n补习科目：${item["补习科目"]}\n补习时间：${item["补习时间"]}\n报价：${item["报价"]}\n地址：${item["地址"]}\n对老师要求：${item["对老师要求"]}`;
            
            try {
                await navigator.clipboard.writeText(text);
                alert("已复制，发给 里昂 即可接单");
            } catch (err) {
                alert("复制失败，请截图发送给里昂！");
            }
        }

        window.onload = filterOrders;
